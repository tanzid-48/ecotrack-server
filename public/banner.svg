      <stop offset="0%" stop-color="#0a4f44"/>
      <stop offset="100%" stop-color="#0f6d5f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative concentric rings (echoing the hero illustration) -->
  <circle cx="1020" cy="150" r="130" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="22"/>
  <circle cx="1020" cy="150" r="95" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="20"/>
  <circle cx="1020" cy="150" r="60" fill="none" stroke="#f0a24d" stroke-opacity="0.9" stroke-width="3" stroke-dasharray="4 6"/>
  <circle cx="1020" cy="150" r="18" fill="#f0a24d"/>

